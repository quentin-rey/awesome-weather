name: Sync Pages From README

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - guides/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate docs/index.md from README.md
        run: |
          mkdir -p docs
          cp -r assets docs/
          cp LICENSE docs/LICENSE
          rm -rf docs/guides
          if [ -d guides ]; then cp -r guides docs/guides; fi
          {
            echo '<!-- AUTO-GENERATED FILE: do not edit docs/index.md directly. -->'
            echo '<!-- Edit README.md, then this file is synchronized by GitHub Actions. -->'
            echo '<!-- markdownlint-disable MD041 -->'
            echo ''
            echo '<!-- markdownlint-disable MD033 -->'
            echo '<style>'
            echo '  .footer {'
            echo '    display: none;'
            echo '  }'
            echo '  .container-lg > h1 {'
            echo '    display: none;'
            echo '  }'
            echo '</style>'
            echo '<!-- markdownlint-enable MD033 -->'
            echo ''
            awk '
              /^# / && !title_skipped { title_skipped=1; next }
              title_skipped && !leading_blank_skipped && /^$/ { leading_blank_skipped=1; next }
              /<!-- PAGES-SKIP-START -->/{exit}
              /\[Awesome Weather\]|\[Contribuer\]|\[GitHub Pages\]/{next}
              {
                if ($0 ~ /^## Sommaire/) { in_toc=1 }
                else if ($0 ~ /^## /) { in_toc=0 }
                if (in_toc && $0 ~ /^  - /) { sub(/^  - /, "- ") }
                print
              }
            ' README.md
            echo ''
            echo '<!-- markdownlint-disable MD033 -->'
            echo '<script>'
            echo "document.addEventListener('DOMContentLoaded', function () {"
            echo "  document.querySelectorAll('a[href^=\"http\"]').forEach(function (link) {"
            echo "    link.setAttribute('target', '_blank');"
            echo "    link.setAttribute('rel', 'noopener noreferrer');"
            echo '  });'
            echo '});'
            echo '</script>'
            echo '<!-- markdownlint-enable MD033 -->'
          } > docs/index.md

      - name: Commit and push if changed
        run: |
          git add docs/index.md
          if [ -d docs/guides ]; then git add docs/guides; fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync docs/index.md from README.md"
          git push
