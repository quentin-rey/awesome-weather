name: Sync Pages From README

on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate docs/index.md from README.md
        run: |
          mkdir -p docs
          cp -r assets docs/
          cp LICENSE docs/LICENSE
          {
            echo '<!-- AUTO-GENERATED FILE: do not edit docs/index.md directly. -->'
            echo '<!-- Edit README.md, then this file is synchronized by GitHub Actions. -->'
            echo ''
            awk '/<!-- PAGES-SKIP-START -->/{exit} /\[Contribuer\]|\[GitHub Pages\]/{next} {print}' README.md
          } > docs/index.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- docs/index.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git commit -m "chore: sync docs/index.md from README.md"
          git push
