name: Check Links

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - guides/**
  pull_request:
    paths:
      - README.md
      - guides/**
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        # bdiff.agriculture.gouv.fr is excluded: its certificate (HARICA/GEANT)
        # is valid but not recognized by the CA bundle embedded in this
        # action, causing a false-positive SSL failure. Verify manually if
        # this exclusion is ever revisited.
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,403,429
            --exclude 'bdiff\.agriculture\.gouv\.fr'
            README.md guides
          fail: true
