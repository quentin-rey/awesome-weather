name: Markdown Lint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - guides/**
  pull_request:
    paths:
      - "**/*.md"
      - guides/**
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v24
